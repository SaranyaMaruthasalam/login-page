<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-box">

        <h2>Welcome Back</h2>

        <p>Sign in to continue</p>

        <form>

            <div class="input-box">
                <input type="text" placeholder="Username">
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password">
            </div>

            <div class="remember">

                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button>Login</button>

        </form>

        <div class="signup">
            Don't have an account?
            <a href="#">Sign Up</a>
        </div>

    </div>

</body>

</html>
